    '<div>To Kennedy: <strong>' + d.walk_min_adj + ' min</strong></div>' +
    '<div>To Winter Hill: <strong>' + d.wh_walk_min_adj + ' min</strong></div>' +
    '<div style="margin-top:4px;color:' + stroke + '">\u2192 Closer to ' + d.assigned + '</div>'
  );
});

schools.forEach(s => {
  const isKennedy = s.name.includes('Kennedy');
  const fill = isKennedy ? '#2563eb' : '#f59e0b';
  const stroke = isKennedy ? '#1e40af' : '#d97706';
  L.marker([s.lat,s.lon],{icon:starIcon(fill,stroke,26),zIndexOffset:1000})
    .addTo(map).bindPopup('<strong>' + s.name + '</strong><br>' + s.address);
  const sn = s.name.replace(' Community Innovation School','');
  L.marker([s.lat,s.lon],{
    icon:L.divIcon({html:'<div style="font-size:11px;font-weight:600;white-space:nowrap;margin-left:15px;margin-top:-6px;color:#1a1a18;text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 3px #fff">' + sn + '</div>',className:'',iconAnchor:[0,6]}),
    zIndexOffset:999, interactive:false
  }).addTo(map);
});
</script>
</body>
</html>
