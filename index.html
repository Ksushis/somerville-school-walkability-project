<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Somerville School Walkability Maps</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f5f4f0; display: flex; flex-direction: column; height: 100vh; }

#site-header {
  padding: 10px 18px;
  background: #1e3a5f;
  color: #fff;
  flex-shrink: 0;
}
#site-header h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.01em; }
#site-header p  { font-size: 11px; color: #93c5fd; margin-top: 2px; }

#tab-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  background: #e5e7eb;
  border-bottom: 2px solid #d1d5db;
  flex-shrink: 0;
}

.tab {
  padding: 9px 16px;
  font-size: 12px;
  font-weight: 500;
  color: #4b5563;
  background: #f3f4f6;
  border: none;
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: background 0.1s;
}
.tab-short { display: none; }
@media (max-width: 640px) {
  .tab { padding: 8px 10px; font-size: 11px; white-space: normal; text-align: left; }
  #site-header p { display: none; }
  .tab-long { display: none; }
  .tab-short { display: inline; }
}
.tab:hover { background: #e9eaf0; color: #1e3a5f; }
.tab.active {
  background: #fff;
  color: #1e3a5f;
  border-bottom: 3px solid #1e3a5f;
  font-weight: 600;
}

#map-frame {
  flex: 1;
  border: none;
  width: 100%;
  display: block;
}
</style>
</head>
<body>

<div id="site-header">
  <h1>Somerville School Walkability Analysis</h1>
  <p>Interactive maps exploring walking distances and school assignment scenarios</p>
</div>

<div id="tab-bar">
  <button class="tab active" onclick="switchTab(this, 'side_by_side_comparison.html')">
    <span class="tab-long">Side-by-Side: Current vs. Brown → Winter Hill</span>
    <span class="tab-short">Side-by-Side</span>
  </button>
  <button class="tab" onclick="switchTab(this, 'brown_catchment_assignment_by_walkability.html')">
    <span class="tab-long">Brown Catchment: Closest School by Walkability</span>
    <span class="tab-short">Brown Catchment</span>
  </button>
  <button class="tab" onclick="switchTab(this, 'current_and_planned_displacement_comparison.html')">
    <span class="tab-long">Displacement: Winter Hill (now) vs. Brown (proposed)</span>
    <span class="tab-short">Displacement</span>
  </button>
</div>

<iframe id="map-frame" src="side_by_side_comparison.html"></iframe>

<script>
function switchTab(btn, src) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('map-frame').src = src;
}
</script>

</body>
</html>
