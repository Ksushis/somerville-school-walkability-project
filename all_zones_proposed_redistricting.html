const MIN_MIN = 0, MAX_MIN = 33;
const STOPS = [[0,[34,197,94]],[0.3,[134,239,172]],[0.55,[253,224,71]],[0.75,[251,146,60]],[1.0,[239,68,68]]];
function lerpColor(t) {
  t = Math.max(0, Math.min(1, t));
  let i = 0;
  while (i < STOPS.length - 2 && t > STOPS[i+1][0]) i++;
  const [t0,c0]=STOPS[i],[t1,c1]=STOPS[i+1],f=(t-t0)/(t1-t0);
  return "rgb("+Math.round(c0[0]+f*(c1[0]-c0[0]))+","+Math.round(c0[1]+f*(c1[1]-c0[1]))+","+Math.round(c0[2]+f*(c1[2]-c0[2]))+")";
}
function walkColor(mins) { return lerpColor((mins-MIN_MIN)/(MAX_MIN-MIN_MIN)); }
function starIcon(fill,stroke,size) {
  const svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+size+'" height="'+size+'" viewBox="0 0 24 24"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="'+fill+'" stroke="'+stroke+'" stroke-width="1.5"/></svg>';
  return L.divIcon({html:svg,className:'',iconAnchor:[size/2,size/2],iconSize:[size,size]});
}

async function loadBoundaries() {
  for (const town of towns) {
    try {
      const isSomerville = town === "Somerville";
      const url = "https://nominatim.openstreetmap.org/search?q=" + encodeURIComponent(town+", Massachusetts, USA") + "&polygon_geojson=1&format=json&limit=1";
      const resp = await fetch(url, {headers:{"User-Agent":"somerville-school-map/1.0"}});
      const data = await resp.json();
      if (!data.length || !data[0].geojson) continue;
      L.geoJSON(data[0].geojson, {
        style: { color: isSomerville?"#6366f1":"#94a3b8", weight: isSomerville?2.5:1.5, opacity: isSomerville?0.9:0.5, fill:false, dashArray: isSomerville?null:"5 5" }
      }).addTo(map);
      L.marker([parseFloat(data[0].lat), parseFloat(data[0].lon)], {
        icon: L.divIcon({ html:'<div style="font-size:12px;font-weight:600;color:'+(isSomerville?'#6366f1':'#94a3b8')+';white-space:nowrap;text-shadow:0 0 3px #fff,0 0 3px #fff">'+town+'</div>', className:'', iconAnchor:[30,8] }),
        interactive:false, zIndexOffset:-100
      }).addTo(map);
    } catch(e) { console.warn('Boundary failed for', town, e); }
  }
}
