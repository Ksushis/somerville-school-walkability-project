const MIN_MIN = 0, MAX_MIN = 33;
const STOPS = [
  [0,    [34,  197, 94]],
  [0.3,  [134, 239, 172]],
  [0.55, [253, 224, 71]],
  [0.75, [251, 146, 60]],
  [1.0,  [239, 68,  68]],
];
function lerpColor(t) {
  t = Math.max(0, Math.min(1, t));
  let i = 0;
  while (i < STOPS.length - 2 && t > STOPS[i+1][0]) i++;
  const [t0, c0] = STOPS[i], [t1, c1] = STOPS[i+1];
  const f = (t - t0) / (t1 - t0);
  return "rgb(" + Math.round(c0[0]+f*(c1[0]-c0[0])) + "," + Math.round(c0[1]+f*(c1[1]-c0[1])) + "," + Math.round(c0[2]+f*(c1[2]-c0[2])) + ")";
}
function walkColor(mins) { return lerpColor((mins - MIN_MIN) / (MAX_MIN - MIN_MIN)); }
function starIcon(fill, stroke, size) {
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 24 24"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="' + fill + '" stroke="' + stroke + '" stroke-width="1.5"/></svg>';
  return L.divIcon({ html: svg, className: '', iconAnchor: [size/2, size/2], iconSize: [size, size] });
}
function addSchools(map, targets) {
  schools.forEach(s => {
    const isTarget = targets.some(t => s.name.includes(t));
    const fill   = isTarget ? '#facc15' : '#94a3b8';
    const stroke = isTarget ? '#a16207' : '#475569';
    const size   = isTarget ? 26 : 18;
    L.marker([s.lat, s.lon], { icon: starIcon(fill, stroke, size), zIndexOffset: 1000 })
      .addTo(map).bindPopup('<strong>' + s.name + '</strong>' + (s.grades ? ' (' + s.grades + ')' : '') + '<br>' + s.address);
    const shortName = s.name.replace(' Community Innovation School','').replace(' Community School','').replace(' Early Childhood Center','').replace(' Neighborhood School','');
    L.marker([s.lat, s.lon], {
      icon: L.divIcon({ html: '<div style="font-size:11px;font-weight:600;white-space:nowrap;margin-left:14px;margin-top:-6px;color:#1a1a18;text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 3px #fff">' + shortName + '</div>', className: '', iconAnchor: [0, 6] }),
      zIndexOffset: 999, interactive: false
    }).addTo(map);
  });
}
