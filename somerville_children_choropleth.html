function blueColor(val, max) {
  const t = Math.max(0, Math.min(1, val / max));
  const stops = [[247,251,255],[107,174,214],[8,48,107]];
  let r,g,b;
  if (t < 0.5) {
    const f = t / 0.5;
    r = stops[0][0] + f*(stops[1][0]-stops[0][0]);
    g = stops[0][1] + f*(stops[1][1]-stops[0][1]);
    b = stops[0][2] + f*(stops[1][2]-stops[0][2]);
  } else {
    const f = (t - 0.5) / 0.5;
    r = stops[1][0] + f*(stops[2][0]-stops[1][0]);
    g = stops[1][1] + f*(stops[2][1]-stops[1][1]);
    b = stops[1][2] + f*(stops[2][2]-stops[1][2]);
  }
  return "rgb(" + Math.round(r) + "," + Math.round(g) + "," + Math.round(b) + ")";
}

}

    .addTo(map).bindPopup('<strong>'+s.name+'</strong>'+(s.grades?' ('+s.grades+')':'')+'<br>'+s.address);
  const sn=s.name.replace(' Community Innovation School','').replace(' Community School','').replace(' Early Childhood Center','').replace(' Neighborhood School','');
  L.marker([s.lat,s.lon],{icon:L.divIcon({html:'<div style="font-size:11px;font-weight:600;white-space:nowrap;margin-left:13px;margin-top:-6px;color:#1a1a18;text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 3px #fff">'+sn+'</div>',className:'',iconAnchor:[0,6]}),zIndexOffset:999,interactive:false}).addTo(map);
});
</script>
</body>
</html>
